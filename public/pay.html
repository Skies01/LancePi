<!DOCTYPE html>
<html>
<head>
  <title>LancePi - Pay with Pi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h2>Pay Freelancer with Pi</h2>
  <button onclick="pay()">Pay 1 Test-Pi</button>
  <div id="log"></div>
  
  <script>
    Pi.init({ version: "2.0", sandbox: true });
    
    function log(msg) {
      document.getElementById('log').innerHTML += msg + '<br>';
    }

    async function pay() {
      log('Button tapped...');
      
      try {
        // Step 1: Authenticate user and request payments scope
        log('Requesting permissions...');
        const scopes = ['payments'];
        const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
        log('Authenticated as: ' + authResult.user.username);
        
        // Step 2: Create payment
        log('Creating payment...');
        Pi.createPayment({
          amount: 1,
          memo: "LancePi Testnet Payment",
          metadata: { type: "testnet" }
        }, {
          onReadyForServerApproval: (paymentId) => {
            log('Payment ready: ' + paymentId);
            log('TAP APPROVE IN WALLET');
          },
          onReadyForServerCompletion: (paymentId, txid) => {
            log('Payment complete! TX: ' + txid);
            alert("Step 10 Done! TX: " + txid);
          },
          onCancel: (paymentId) => log("User cancelled"),
          onError: (error, payment) => log("Error: " + error)
        });
        
      } catch(err) {
        log('Auth Error: ' + err);
      }
    }

    function onIncompletePaymentFound(payment) {
      log('Found incomplete payment: ' + payment.identifier);
    }
  </script>
</body>
</html>
