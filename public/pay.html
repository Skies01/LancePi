<!DOCTYPE html>
<html>
<head>
  <title>LancePi - Pay with Pi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h2>Pay Freelancer with Pi</h2>
  <button onclick="pay()">Pay 1 Test-Pi</button>
  <div id="log"></div>
  
  <script>
    Pi.init({ version: "2.0", sandbox: true });
    
    function log(msg) {
      document.getElementById('log').innerHTML += msg + '<br>';
    }

    // REPLACE THIS WITH YOUR PI API KEY FROM STEP 6
    const PI_API_KEY = ‘’;

    async function pay() {
      log('Button tapped...');
      
      try {
        const scopes = ['payments'];
        await Pi.authenticate(scopes, onIncompletePaymentFound);
        log('Authenticated');
        
        Pi.createPayment({
          amount: 1,
          memo: "LancePi Testnet",
          metadata: {}
        }, {
          onReadyForServerApproval: (paymentId) => {
            log('Approving payment...');
            // Auto-approve for Testnet
            fetch(`https://api.minepi.com/v2/payments/${paymentId}/approve`, {
              method: 'POST',
              headers: {
                'Authorization': `Key ${PI_API_KEY}`
              }
            }).then(() => log('Approved! Check wallet'));
          },
          onReadyForServerCompletion: (paymentId, txid) => {
            log('Payment complete! TX: ' + txid);
            alert("Step 10 Done!");
          },
          onCancel: () => log("Cancelled"),
          onError: (error) => log("Error: " + error)
        });
        
      } catch(err) {
        log('Error: ' + err);
      }
    }

    function onIncompletePaymentFound(payment) {}
  </script>
</body>
</html>
