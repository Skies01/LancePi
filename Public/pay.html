<!DOCTYPE html>
<html>
<head>
  <title>LancePi - Pay with Pi</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h2>Pay Freelancer with Pi</h2>
  <button onclick="pay()">Pay 1 Test-Pi</button>
  
  <script>
    Pi.init({ version: "2.0", sandbox: true });
    
    function pay() {
      Pi.createPayment({
        amount: 1,
        memo: "Payment for LancePi freelance work",
        metadata: { type: "freelance" }
      }, {
        onReadyForServerApproval: (paymentId) => console.log("Approve:", paymentId),
        onReadyForServerCompletion: (paymentId, txid) => {
          alert("Payment complete! TX: " + txid);
        },
        onCancel: (paymentId) => alert("Cancelled"),
        onError: (error, payment) => alert("Error: " + error)
      });
    }
  </script>
</body>
</html>
